name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + isolation firewall
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]
      - name: ruff
        run: ruff check auxima_ai/ tests/
      - name: pytest (incl. the no-frappe isolation tests)
        run: pytest -v
