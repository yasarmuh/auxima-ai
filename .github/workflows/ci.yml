name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + isolation firewall
    runs-on: ubuntu-22.04
    services:
      # Real Redis so the nonce-store integration drills (AC-1 cross-instance
      # replay, AC-6 fail-closed) actually run here instead of skipping. The
      # health-check gate makes the service ready before the steps start.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]
      - name: ruff
        run: ruff check auxima_ai/ tests/
      - name: pytest (incl. the no-frappe isolation tests)
        run: pytest -v
